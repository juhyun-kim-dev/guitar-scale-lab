<svg xmlns="http://www.w3.org/2000/svg" width="920" height="340" viewBox="0 0 920 340" font-family="'Hiragino Kaku Gothic ProN','Noto Sans JP','Yu Gothic','Meiryo',sans-serif">
  <rect width="920" height="340" fill="#fafafa" rx="12"/>

  <defs>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1 L9 5 L1 9" fill="none" stroke="#8a8a8a" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Flow 1 -->
  <text x="40" y="48" font-size="14" font-weight="bold" fill="#444">① キー / スケールを変更したとき</text>

  <rect x="40" y="64" width="185" height="56" rx="10" fill="#f4efe6" stroke="#b8ab90" stroke-width="1.5"/>
  <text x="132" y="88" text-anchor="middle" font-size="13" font-weight="bold" fill="#4a4437">ユーザー操作</text>
  <text x="132" y="106" text-anchor="middle" font-size="11" fill="#7a725f">キーを選択</text>

  <line x1="227" y1="92" x2="264" y2="92" stroke="#8a8a8a" stroke-width="1.4" marker-end="url(#arrowGray)"/>

  <rect x="268" y="64" width="185" height="56" rx="10" fill="#edeffb" stroke="#7d86d8" stroke-width="1.5"/>
  <text x="360" y="88" text-anchor="middle" font-size="13" font-weight="bold" fill="#3d47a8">page.tsx</text>
  <text x="360" y="106" text-anchor="middle" font-size="11" fill="#5a62b0">共有状態を更新</text>

  <line x1="455" y1="92" x2="492" y2="92" stroke="#8a8a8a" stroke-width="1.4" marker-end="url(#arrowGray)"/>

  <rect x="496" y="64" width="185" height="56" rx="10" fill="#ffffff" stroke="#666666" stroke-width="1.5"/>
  <text x="588" y="88" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">music-theory.ts</text>
  <text x="588" y="106" text-anchor="middle" font-size="11" fill="#777">構成音・コードを計算</text>

  <line x1="683" y1="92" x2="720" y2="92" stroke="#8a8a8a" stroke-width="1.4" marker-end="url(#arrowGray)"/>

  <rect x="724" y="64" width="185" height="56" rx="10" fill="#e7f4ec" stroke="#46a06f" stroke-width="1.5"/>
  <text x="816" y="88" text-anchor="middle" font-size="13" font-weight="bold" fill="#1f6b44">画面を更新</text>
  <text x="816" y="106" text-anchor="middle" font-size="11" fill="#3f8560">一覧・コード・指板が連動</text>

  <!-- Flow 2 -->
  <text x="40" y="208" font-size="14" font-weight="bold" fill="#444">② 音・コード・Strum をクリックしたとき</text>

  <rect x="40" y="224" width="185" height="56" rx="10" fill="#f4efe6" stroke="#b8ab90" stroke-width="1.5"/>
  <text x="132" y="248" text-anchor="middle" font-size="13" font-weight="bold" fill="#4a4437">ユーザー操作</text>
  <text x="132" y="266" text-anchor="middle" font-size="11" fill="#7a725f">音・コードをクリック</text>

  <line x1="227" y1="252" x2="264" y2="252" stroke="#8a8a8a" stroke-width="1.4" marker-end="url(#arrowGray)"/>

  <rect x="268" y="224" width="185" height="56" rx="10" fill="#ffffff" stroke="#666666" stroke-width="1.5"/>
  <text x="360" y="248" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">audio.ts</text>
  <text x="360" y="266" text-anchor="middle" font-size="11" fill="#777">周波数を計算・波形を合成</text>

  <line x1="455" y1="252" x2="492" y2="252" stroke="#8a8a8a" stroke-width="1.4" marker-end="url(#arrowGray)"/>

  <rect x="496" y="224" width="185" height="56" rx="10" fill="#efefef" stroke="#999999" stroke-width="1.5"/>
  <text x="588" y="248" text-anchor="middle" font-size="13" font-weight="bold" fill="#444">Web Audio API</text>
  <text x="588" y="266" text-anchor="middle" font-size="11" fill="#777">ブラウザ標準の音声機能</text>

  <line x1="683" y1="252" x2="720" y2="252" stroke="#8a8a8a" stroke-width="1.4" marker-end="url(#arrowGray)"/>

  <rect x="724" y="224" width="185" height="56" rx="10" fill="#fdf1e6" stroke="#d3924e" stroke-width="1.5"/>
  <text x="816" y="248" text-anchor="middle" font-size="13" font-weight="bold" fill="#9c5f1e">音を再生</text>
  <text x="816" y="266" text-anchor="middle" font-size="11" fill="#b07c40">ストローク・余韻を反映</text>
</svg>
